name: Keep backend alive

on:
  schedule:
    - cron: '0 * * * *'  # every hour (more reliable than 8 min, GitHub cron has delays)
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          URL="${BACKEND_URL}"
          if [ -z "$URL" ]; then
            echo "❌ BACKEND_URL secret not configured!"
            echo "   Go to: Settings → Secrets and variables → Actions"
            echo "   Create secret BACKEND_URL = https://your-app.onrender.com"
            exit 1
          fi
          
          HEALTH_URL="${URL}/api/health"
          echo "▶ Pinging $HEALTH_URL"
          
          # Ping health endpoint
          if curl -fsS "$HEALTH_URL" > /dev/null 2>&1; then
            echo "✓ Health check OK"
          else
            echo "⚠ Health check failed (non-blocking)"
          fi
          
          # Also warm up prediction endpoint to pre-load models
          WARMUP_URL="${URL}/api/warmup"
          echo "▶ Warming up inference models at $WARMUP_URL"
          curl -fsS "$WARMUP_URL" > /dev/null 2>&1 || echo "⚠ Warmup failed (non-blocking)"
          
          echo "✓ Keepalive ping cycle complete"
