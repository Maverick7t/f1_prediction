# Render.com Deployment Configuration
# This file enables one-click deployment to Render

services:
  # Backend API Service
  - type: web
    name: f1-prediction-api
    env: python
    runtime: python-3.12.5
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_PATH
        value: ./f1_training_dataset_2018_2024.csv
      - key: MODEL_DIR
        value: ./models_spencer
      - key: CACHE_DIR
        value: ./cache
      - key: FASTF1_CACHE_DIR
        value: ./f1_cache
      - key: LOG_LEVEL
        value: INFO

  # Weekend prediction sync (runs only Sat/Sun every 3 hours)
  - type: cron
    name: f1-weekend-predictions
    env: python
    runtime: python-3.12.5
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 */3 * * 6,0"
    startCommand: python -m scripts.cron_sync_predictions

  # Post-race actual backfill (runs Sun/Mon every 3 hours)
  - type: cron
    name: f1-actuals-backfill
    env: python
    runtime: python-3.12.5
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 */3 * * 0,1"
    startCommand: python -m scripts.cron_sync_actuals
